    <script>
      const firebaseConfig = {
        apiKey: "PASTE_FIREBASE_API_KEY",
        authDomain: "PASTE_AUTH_DOMAIN",
        projectId: "PASTE_PROJECT_ID",
        storageBucket: "PASTE_STORAGE_BUCKET",

      };
      if (!firebase.apps.length) {
          firebase.initializeApp(firebaseConfig);
      }
      const auth = firebase.auth();
      const googleProvider = new firebase.auth.GoogleAuthProvider();

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      (function() {

        function toggleTheme() {
          const html = document.documentElement;
          const current = html.getAttribute('data-theme') || 'dark';
          const next = current === 'dark' ? 'light' : 'dark';
          html.setAttribute('data-theme', next);
          localStorage.setItem('bf_theme', next);
          updateToggleUI(next);
        }

        function updateToggleUI(theme) {
          const isDark = theme === 'dark';

          // Navbar toggle
          const navBtn = document.getElementById('theme-toggle');
          if (navBtn) navBtn.textContent = isDark ? '🌙' : '☀️';

          const sideIcon = document.getElementById('sidebar-theme-icon');
          const sideLabel = document.getElementById('sidebar-theme-label');
          const toggleCheckbox = document.getElementById('sidebar-theme-toggle');

          if (sideIcon) sideIcon.textContent = isDark ? '🌙' : '☀️';
          if (sideLabel) sideLabel.textContent = isDark ? 'Dark Mode' : 'Light Mode';
          if (toggleCheckbox) toggleCheckbox.checked = !isDark;
        }

        function initTheme() {
          const saved = localStorage.getItem('bf_theme') || 'dark';
          document.documentElement.setAttribute('data-theme', saved);
          updateToggleUI(saved);
        }

        // Expose globally so button onclick works
        window.toggleTheme = toggleTheme;

        // Run on load
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', initTheme);
        } else {
          initTheme();
        }

      })();
    </script>
